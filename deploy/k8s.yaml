# Sample Kubernetes manifest for the live demo (the bundled test/dummy app).
# Build + push the image first:  docker build -t YOUR_REGISTRY/crud-components-demo:latest .
#                                docker push YOUR_REGISTRY/crud-components-demo:latest
# then set `image:` below and `kubectl apply -f deploy/k8s.yaml`.
#
# Safety model for a public demo with no PVC: the DB is an ephemeral emptyDir,
# reseeded on boot and every 10 min by DEMO_RESET, so nothing a visitor does
# persists; the pod runs rootless with a read-only root filesystem and no extra
# capabilities, so a compromise has little to grab. There are no secrets or real
# data, which keeps it a low-value target.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: crud-components-demo
  labels: { app: crud-components-demo }
spec:
  replicas: 1                       # single process — the reset thread runs in-process
  selector:
    matchLabels: { app: crud-components-demo }
  template:
    metadata:
      labels: { app: crud-components-demo }
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000             # the `app` user baked into the image
        fsGroup: 1000               # so the emptyDir mounts are writable
      containers:
        - name: app
          image: YOUR_REGISTRY/crud-components-demo:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - { name: RAILS_ENV, value: "production" }
            - { name: DEMO_RESET, value: "1" }
            - { name: DEMO_RESET_SECONDS, value: "600" }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits:   { cpu: "500m", memory: "512Mi" }
          readinessProbe:
            httpGet: { path: /, port: 8080 }
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /, port: 8080 }
            initialDelaySeconds: 45
            periodSeconds: 20
          # Writable paths for the read-only root fs — all ephemeral, all bounded.
          volumeMounts:
            - { name: db,      mountPath: /app/test/dummy/db }
            - { name: storage, mountPath: /app/test/dummy/storage }
            - { name: apptmp,  mountPath: /app/test/dummy/tmp }
            - { name: tmp,     mountPath: /tmp }
      volumes:
        - { name: db,      emptyDir: { sizeLimit: 256Mi } }
        - { name: storage, emptyDir: { sizeLimit: 256Mi } }
        - { name: apptmp,  emptyDir: { sizeLimit: 128Mi } }
        - { name: tmp,     emptyDir: { sizeLimit: 128Mi } }
---
apiVersion: v1
kind: Service
metadata:
  name: crud-components-demo
spec:
  selector: { app: crud-components-demo }
  ports:
    - { port: 80, targetPort: 8080 }
