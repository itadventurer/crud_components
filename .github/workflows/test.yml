name: Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    name: Ruby ${{ matrix.ruby }} · Rails ${{ matrix.rails }}
    strategy:
      fail-fast: false
      matrix:
        # A representative spread, not the full cartesian: every supported Ruby
        # (3.2–4.0) and every supported Rails (7.1, 7.2, 8.0) appears, within
        # each Rails's own Ruby floor (7.2 needs 3.1+, 8.0 needs 3.2+).
        include:
          - { ruby: '3.2', rails: '7.1' }
          - { ruby: '3.2', rails: '8.0' }
          - { ruby: '3.3', rails: '7.2' }
          - { ruby: '3.3', rails: '8.0' }
          - { ruby: '3.4', rails: '8.0' }
          - { ruby: '4.0', rails: '8.0' }
    env:
      RAILS_VERSION: ${{ matrix.rails }}
    steps:
      - uses: actions/checkout@v4
      # Resolve a fresh lockfile so each Rails minor gets compatible deps.
      - run: rm -f Gemfile.lock
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
      - run: bundle exec rake test
