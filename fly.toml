# Live demo of the playground (test/dummy). Setup:
#   fly launch --no-deploy   # creates the app; confirm/adjust `app` + region
#   fly deploy
# Ephemeral SQLite — no volume — so the DB resets on every deploy/restart, and
# DEMO_RESET reseeds it every 10 min (test/dummy/config/initializers/demo_reset.rb),
# so nothing a visitor does sticks around.
app = "crud-components-demo"
primary_region = "fra"

[build]

[env]
  RAILS_ENV = "development"
  DEMO_RESET = "1"
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false   # keep one machine up so the reset thread runs
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
